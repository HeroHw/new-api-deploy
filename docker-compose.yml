services:
  app:
    image: ${ACR_REGISTRY}/${APP_NAME}:${IMAGE_TAG}
    container_name: ${CONTAINER_NAME:-app}
    networks:
      - deploy-network
    ulimits:
      nofile:
        soft: ${ULIMIT_NOFILE_SOFT:-1024}
        hard: ${ULIMIT_NOFILE_HARD:-1024}
    sysctls:
      - net.ipv4.ip_local_port_range=${IP_LOCAL_PORT_RANGE_START:-32768} ${IP_LOCAL_PORT_RANGE_END:-60999}
      - net.ipv4.tcp_tw_reuse=${TCP_TW_REUSE:-2}
      - net.ipv4.tcp_fin_timeout=${TCP_FIN_TIMEOUT:-60}
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    env_file:
      - .env

networks:
  deploy-network:
    name: ${NETWORK_NAME:-deploy-network}
    external: true
