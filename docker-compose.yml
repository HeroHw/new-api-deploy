services:
  app:
    image: ${ACR_REGISTRY}/${APP_NAME}:${IMAGE_TAG}
    container_name: ${CONTAINER_NAME:-app}
    networks:
      - deploy-network
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    env_file:
      - .env

networks:
  deploy-network:
    name: ${NETWORK_NAME:-deploy-network}
    external: true
