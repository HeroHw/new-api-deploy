services:
  haproxy:
    build:
      context: .
      dockerfile: Dockerfile.haproxy
    image: ${ACR_REGISTRY}/${APP_NAME}-haproxy:latest
    container_name: ${CONTAINER_HAPROXY:-haproxy}
    networks:
      - deploy-network
    ports:
      - "${HAPROXY_HTTP_PORT:-80}:80"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
      - haproxy-socket:/run/haproxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
      interval: 10s
      timeout: 5s
      retries: 3
    env_file:
      - .env

networks:
  deploy-network:
    name: ${NETWORK_NAME:-deploy-network}
    external: true

volumes:
  haproxy-socket:
    name: haproxy-socket
